<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Triángulos - Gráficos Computacionales</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
:root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container { 
            background: var(--card); 
            padding: 2rem; 
            border-radius: 1rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 800px; width: 95%;
        }

        header { text-align: center; margin-bottom: 1.5rem; }
        h2 { margin: 0; color: var(--primary); }

        .layout { display: flex; gap: 20px; flex-wrap: wrap; }

        .panel-controls { flex: 1; min-width: 250px; }

        .point-input { 
            background: #f1f5f9; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
        }

        input[type="number"] {
            width: 60px; border: 1px solid #cbd5e1;
            border-radius: 4px; padding: 4px;
        }

        canvas { 
            background-color: #fff; 
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            cursor: crosshair;
            border: 1px solid #e2e8f0;
        }

        .actions { margin-top: 1rem; display: flex; gap: 10px; }

        button { 
            flex: 1; padding: 12px; cursor: pointer; 
            background-color: var(--primary); color: white; 
            border: none; border-radius: 8px; font-weight: 600;
            transition: all 0.2s;
        }

        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

        #message { 
            margin-top: 1rem; padding: 10px; border-radius: 6px;
            font-size: 0.9rem; text-align: center; font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Calculadora Geométrica: Triángulos</h2>
       
        <div class="inputs">
            <div class="point-input">
                <strong>Punto 1</strong><br>
                X: <input type="number" id="x1" value="150" style="width:50px">
                Y: <input type="number" id="y1" value="100" style="width:50px">
            </div>
            <div class="point-input">
                <strong>Punto 2</strong><br>
                X: <input type="number" id="x2" value="450" style="width:50px">
                Y: <input type="number" id="y2" value="150" style="width:50px">
            </div>
            <div class="point-input">
                <strong>Punto 3</strong><br>
                X: <input type="number" id="x3" value="300" style="width:50px">
                Y: <input type="number" id="y3" value="400" style="width:50px">
            </div>
        </div>

        <div class="controls">
            <label for="method">Algoritmo:</label>
            <select id="method">
                <option value="dda">DDA (Diferencial Digital)</option>
                <option value="bresenham">Bresenham (Enteros)</option>
            </select>
            <button id="drawBtn">Validar y Dibujar</button>
        </div>

        <div id="message"></div>
        <canvas id="mainCanvas" width="600" height="500"></canvas>
    </div>

    <script src="6014312_v1.js"></script>
</body>
</html>
